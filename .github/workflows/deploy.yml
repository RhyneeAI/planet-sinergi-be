name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
      migrate:
        description: 'Run migrations?'
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Execute deploy
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH_STAGING: ${{ secrets.DEPLOY_PATH_STAGING }}
          DEPLOY_PATH_PRODUCTION: ${{ secrets.DEPLOY_PATH_PRODUCTION }}
          PHP_BIN: ${{ secrets.PHP_BIN }}
        run: |
          DEPLOY_PATH="$DEPLOY_PATH_STAGING"
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            DEPLOY_PATH="$DEPLOY_PATH_PRODUCTION"
          fi

          if [ -z "$DEPLOY_PATH" ]; then
            echo "Error: DEPLOY_PATH for ${{ github.event.inputs.environment }} is not set"
            exit 1
          fi

          PHP="${PHP_BIN:-php}"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << ENDSSH
            set -e
            cd "$DEPLOY_PATH"

            git fetch origin
            git checkout -f ${{ github.event.inputs.branch }}
            git clean -fd
            git reset --hard origin/${{ github.event.inputs.branch }}

            if [ "${{ github.event.inputs.migrate }}" = "true" ]; then
              $PHP artisan migrate --force
            fi

            $PHP artisan queue:restart || true

            echo "Deploy to ${{ github.event.inputs.environment }} complete"
          ENDSSH

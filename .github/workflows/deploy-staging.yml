name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: gudang_planet_testing
          MYSQL_USER: laravel
          MYSQL_PASSWORD: laravel
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Copy environment file
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: gudang_planet_testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: gudang_planet_testing
          DB_USERNAME: root
          DB_PASSWORD: root
          APP_ENV: testing
        run: php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Verify SSH connection
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -e
          ssh -p "${SSH_PORT:-2223}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            'echo "SSH OK"'

      - name: Sync files to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -e
          SSH_OPTS="-p ${SSH_PORT:-2223} -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
          REMOTE="${SSH_USER}@${SSH_HOST}"
          DEPLOY_PATH="/home/plaq5446/public_html/staging.planetsinergi.com/planet-sinergi"

          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p '${DEPLOY_PATH}'"

          tar czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='storage/app/public/*' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            . | ssh ${SSH_OPTS} "${REMOTE}" "cd '${DEPLOY_PATH}' && tar xzf -"

      - name: Run migrations and cache on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -e
          DEPLOY_PATH="/home/plaq5446/public_html/staging.planetsinergi.com/planet-sinergi"
          ssh -p "${SSH_PORT:-2223}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "set -e && cd '${DEPLOY_PATH}' && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan storage:link 2>/dev/null || true"
